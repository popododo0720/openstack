---
- name: OpenStack 추가 서비스 배포 (Skyline 대시보드 - HTTPS)
  hosts: helm1
  gather_facts: false
  become: true
  vars:
    openstack_release: "2025.1"
    features: "admin_creds tls"
    overrides_dir: /root/overrides
    overrides_url: https://opendev.org/openstack/openstack-helm/raw/branch/master/values_overrides
    admin_username: coremax
    admin_password: "coremax1@#"
    skyline_db_password: password
    mariadb_root_password: password
  environment:
    OPENSTACK_RELEASE: "{{ openstack_release }}"
    FEATURES: "{{ features }}"
    OVERRIDES_DIR: "{{ overrides_dir }}"
    OVERRIDES_URL: "{{ overrides_url }}"
  tasks:
    # ============================================================
    # Phase 1: 정리
    # ============================================================
    - name: "[Phase 1] 실패/Pending Helm release 정리"
      shell: |
        STATUS=$(helm status skyline -n openstack -o json 2>/dev/null | jq -r '.info.status // "not_installed"')
        if [[ "$STATUS" == pending-* || "$STATUS" == "failed" ]]; then
          echo "CLEANING: skyline (status: $STATUS)"
          helm uninstall skyline -n openstack --no-hooks 2>/dev/null || true
          kubectl delete pods -n openstack -l application=skyline --force --grace-period=0 2>/dev/null || true
          kubectl delete jobs -n openstack -l application=skyline --force 2>/dev/null || true
          sleep 5
        fi
      register: pending_cleanup
      changed_when: "'CLEANING' in pending_cleanup.stdout"

    # ============================================================
    # Phase 2: MariaDB 수동 DB/사용자 생성 + X509 복원
    # ============================================================
    - name: "[Phase 2] Skyline DB/사용자 생성"
      shell: |
        kubectl exec -n openstack mariadb-server-0 -c mariadb -- mariadb \
          -u root -p{{ mariadb_root_password }} \
          --ssl-cert=/etc/mysql/certs/tls.crt \
          --ssl-key=/etc/mysql/certs/tls.key \
          --ssl-ca=/etc/mysql/certs/ca.crt --skip-ssl-verify-server-cert \
          -e "
            CREATE DATABASE IF NOT EXISTS skyline;
            CREATE USER IF NOT EXISTS 'skyline'@'%' IDENTIFIED BY '{{ skyline_db_password }}';
            GRANT ALL PRIVILEGES ON skyline.* TO 'skyline'@'%';
            FLUSH PRIVILEGES;
            SELECT 'DB_AND_USER_READY';
          "
      register: db_create_result
      changed_when: "'DB_AND_USER_READY' in db_create_result.stdout"

    - name: "[Phase 2] MariaDB root X509 복원"
      shell: |
        kubectl exec -n openstack mariadb-server-0 -c mariadb -- mariadb \
          -u root -p{{ mariadb_root_password }} \
          --ssl-cert=/etc/mysql/certs/tls.crt \
          --ssl-key=/etc/mysql/certs/tls.key \
          --ssl-ca=/etc/mysql/certs/ca.crt --skip-ssl-verify-server-cert \
          -e "
            ALTER USER 'root'@'%' REQUIRE X509;
            FLUSH PRIVILEGES;
            SELECT 'X509_RESTORED';
          "
      register: x509_result
      changed_when: "'X509_RESTORED' in x509_result.stdout"

    # ============================================================
    # Phase 3: Helm overrides 준비
    # ============================================================
    - name: "[Phase 3] 오버라이드 다운로드"
      shell: "helm osh get-values-overrides -d -u {{ overrides_url }} -p {{ overrides_dir }} -c skyline {{ features }}"
      changed_when: false

    - name: "[Phase 3] 오버라이드 디렉토리"
      file:
        path: "{{ overrides_dir }}/skyline"
        state: directory
        mode: "0755"

    - name: "[Phase 3] admin 크레덴셜"
      copy:
        dest: "{{ overrides_dir }}/skyline/admin_creds.yaml"
        content: |
          endpoints:
            identity:
              auth:
                admin:
                  username: {{ admin_username }}
                  password: "{{ admin_password }}"

    - name: "[Phase 3] TLS 오버라이드"
      copy:
        dest: "{{ overrides_dir }}/skyline/tls.yaml"
        content: |
          manifests:
            job_ks_user: false
            job_db_init: false
            certificates: false
            ingress: false
            service_ingress: false
          dependencies:
            static:
              skyline:
                jobs:
                  - skyline-db-sync
                services:
                  - endpoint: internal
                    service: oslo_db
                  - endpoint: internal
                    service: identity
              db_sync:
                jobs: []
                services:
                  - endpoint: internal
                    service: oslo_db
          endpoints:
            identity:
              scheme:
                default: https
              port:
                api:
                  default: 443
              auth:
                admin:
                  cacert: /etc/ssl/certs/openstack-helm.crt
                skyline:
                  cacert: /etc/ssl/certs/openstack-helm.crt
          conf:
            skyline:
              default:
                database_url: "mysql+pymysql://skyline:{{ skyline_db_password }}@mariadb.openstack.svc.cluster.local:3306/skyline?charset=utf8"
              openstack:
                cafile: /etc/ssl/certs/openstack-helm.crt
          pod:
            mounts:
              skyline:
                skyline:
                  volumeMounts:
                    - name: os-ca-cert
                      mountPath: /etc/ssl/certs/openstack-helm.crt
                      subPath: ca.crt
                      readOnly: true
                  volumes:
                    - name: os-ca-cert
                      secret:
                        secretName: mariadb-tls-direct

    # ============================================================
    # Phase 4: Keystone 사용자 수동 생성
    # ============================================================
    - name: "[Phase 4] Skyline Keystone 사용자"
      shell: |
        kubectl exec -n openstack deploy/heat-api -c heat-api -- bash -c '
          export OS_AUTH_URL=https://keystone-api.openstack.svc.cluster.local:5000/v3
          export OS_USERNAME={{ admin_username }}
          export OS_PASSWORD="{{ admin_password }}"
          export OS_PROJECT_NAME=admin
          export OS_USER_DOMAIN_NAME=default
          export OS_PROJECT_DOMAIN_NAME=default
          export OS_IDENTITY_API_VERSION=3
          export OS_CACERT=/etc/heat/certs/ca.crt
          export OS_INTERFACE=internal
          openstack user create --or-show --domain default --password {{ skyline_db_password }} skyline
          openstack role add --user skyline --user-domain default \
            --project admin --project-domain default admin 2>/dev/null || true
          openstack user show skyline --domain default -f value -c id
        '
      register: ks_user_result
      changed_when: true

    - name: "[Phase 4] Keystone 결과"
      debug:
        var: ks_user_result.stdout_lines

    # ============================================================
    # Phase 5: Helm 배포 + cert-manager Certificate 수동 생성
    # ============================================================
    - name: "[Phase 5] Skyline 배포"
      shell: >
        helm upgrade --install skyline openstack-helm/skyline
        --namespace=openstack
        $(helm osh get-values-overrides -p {{ overrides_dir }} -c skyline {{ features }})
      changed_when: true

    - name: "[Phase 5] 파드 대기"
      shell: helm osh wait-for-pods openstack
      retries: 30
      delay: 10
      register: result
      until: result.rc == 0
      changed_when: false

    - name: "[Phase 5] cert-manager Certificate 생성"
      shell: |
        cat <<'EOF' | kubectl apply -f -
        apiVersion: cert-manager.io/v1
        kind: Certificate
        metadata:
          name: skyline-tls-internal
          namespace: openstack
        spec:
          secretName: skyline-tls-internal
          issuerRef:
            name: ca-issuer
            kind: ClusterIssuer
          dnsNames:
            - skyline-api.openstack.svc.cluster.local
            - skyline.openstack.svc.cluster.local
          duration: 8760h
          renewBefore: 720h
        EOF
      changed_when: true

    - name: "[Phase 5] TLS 인증서 대기"
      shell: kubectl wait --for=condition=Ready certificate/skyline-tls-internal -n openstack --timeout=120s
      changed_when: false

    # ============================================================
    # Phase 6: Deployment 패치 (TLS cert 마운트 + SSL init 스크립트)
    # ============================================================
    - name: "[Phase 6] Deployment에 TLS volume + volumeMount 패치"
      shell: |
        kubectl patch deployment skyline -n openstack --type='json' -p='[
          {"op": "add", "path": "/spec/template/spec/volumes/-", "value": {"name": "skyline-tls-cert", "secret": {"secretName": "skyline-tls-internal"}}},
          {"op": "add", "path": "/spec/template/spec/initContainers/1/volumeMounts/-", "value": {"name": "skyline-tls-cert", "mountPath": "/etc/skyline/certs", "readOnly": true}}
        ]'
      changed_when: true

    - name: "[Phase 6] api-init SSL 스크립트"
      copy:
        dest: /tmp/skyline-ssl-init.sh
        mode: "0755"
        content: |
          #!/bin/bash
          set -ex
          cp /etc/skyline/certs/tls.crt /etc/nginx/tls.crt
          cp /etc/skyline/certs/tls.key /etc/nginx/tls.key
          GENERATOR_ARGS="--output-file /etc/nginx/nginx.conf --ssl-certfile /etc/nginx/.skyline/tls.crt --ssl-keyfile /etc/nginx/.skyline/tls.key"
          skyline-nginx-generator ${GENERATOR_ARGS}

    - name: "[Phase 6] ConfigMap SSL 패치"
      shell: |
        kubectl patch configmap skyline-bin -n openstack --type merge \
          -p "{\"data\":{\"skyline-apiserver-init.sh\": $(cat /tmp/skyline-ssl-init.sh | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')}}"
      changed_when: true

    - name: "[Phase 6] 롤아웃 재시작"
      shell: kubectl rollout restart deployment/skyline -n openstack
      changed_when: true

    - name: "[Phase 6] 롤아웃 대기"
      shell: kubectl rollout status deployment/skyline -n openstack --timeout=180s
      changed_when: false

    # ============================================================
    # Phase 7: LoadBalancer 서비스
    # ============================================================
    - name: "[Phase 7] Skyline LoadBalancer (192.168.0.60:443)"
      shell: |
        cat <<'SVCEOF' | kubectl apply -f -
        apiVersion: v1
        kind: Service
        metadata:
          name: skyline-lb
          namespace: openstack
          annotations:
            metallb.universe.tf/loadBalancerIPs: "192.168.0.60"
        spec:
          type: LoadBalancer
          selector:
            application: skyline
            component: skyline
          ports:
            - name: https
              port: 443
              targetPort: 9999
              protocol: TCP
        SVCEOF
      changed_when: true

    # ============================================================
    # Phase 8: 검증
    # ============================================================
    - name: "[Phase 8] Skyline HTTPS 확인"
      shell: |
        HTTP_CODE=$(curl -sk -o /dev/null -w '%{http_code}' https://192.168.0.60/ 2>/dev/null || echo "000")
        echo "HTTP Status: ${HTTP_CODE}"
        if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "302" ]; then
          echo "SKYLINE_HTTPS_OK"
        else
          echo "SKYLINE_HTTPS_FAILED (code: ${HTTP_CODE})"
          kubectl get pods -n openstack -l application=skyline
          kubectl logs -n openstack deploy/skyline -c nginx --tail=20 2>/dev/null || true
          kubectl logs -n openstack deploy/skyline -c api-init --tail=20 2>/dev/null || true
        fi
      register: verify_result
      changed_when: false
      failed_when: "'SKYLINE_HTTPS_FAILED' in verify_result.stdout"
