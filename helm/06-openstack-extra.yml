---
- name: OpenStack 추가 서비스 배포
  hosts: helm1
  gather_facts: false
  become: true
  vars:
    openstack_release: "2025.1"
    features: "2025.1 ubuntu_noble ovn tls"
    overrides_dir: /root/overrides
    overrides_url: https://opendev.org/openstack/openstack-helm/raw/branch/master/values_overrides
  environment:
    OPENSTACK_RELEASE: "{{ openstack_release }}"
    FEATURES: "{{ features }}"
    OVERRIDES_DIR: "{{ overrides_dir }}"
    OVERRIDES_URL: "{{ overrides_url }}"
  tasks:
    - name: 추가 차트 값 오버라이드 다운로드 (tls 포함)
      shell: "helm osh get-values-overrides -d -u {{ overrides_url }} -p {{ overrides_dir }} -c {{ item }} {{ features }}"
      loop:
        - horizon
        - barbican
        - skyline
      changed_when: false

    # --- Horizon ---
    - name: Horizon 배포
      shell: >
        helm upgrade --install horizon openstack-helm/horizon
        --namespace=openstack
        $(helm osh get-values-overrides -p {{ overrides_dir }} -c horizon {{ features }})
      changed_when: true

    - name: Horizon 파드 대기
      shell: helm osh wait-for-pods openstack
      retries: 30
      delay: 10
      register: result
      until: result.rc == 0
      changed_when: false

    # --- Barbican ---
    - name: Barbican 배포
      shell: >
        helm upgrade --install barbican openstack-helm/barbican
        --namespace=openstack
        $(helm osh get-values-overrides -p {{ overrides_dir }} -c barbican {{ features }})
      changed_when: true

    - name: Barbican 파드 대기
      shell: helm osh wait-for-pods openstack
      retries: 30
      delay: 10
      register: result
      until: result.rc == 0
      changed_when: false

    # --- Skyline (모던 대시보드) ---
    - name: Skyline 배포
      shell: >
        helm upgrade --install skyline openstack-helm/skyline
        --namespace=openstack
        $(helm osh get-values-overrides -p {{ overrides_dir }} -c skyline {{ features }})
      changed_when: true

    - name: Skyline 파드 대기
      shell: helm osh wait-for-pods openstack
      retries: 30
      delay: 10
      register: result
      until: result.rc == 0
      changed_when: false

    # --- Skyline LoadBalancer (192.168.0.60 - VIP, HTTPS) ---
    - name: Skyline LoadBalancer 서비스 생성 (192.168.0.60:443)
      shell: |
        cat <<'SVCEOF' | kubectl apply -f -
        apiVersion: v1
        kind: Service
        metadata:
          name: skyline-lb
          namespace: openstack
          annotations:
            metallb.universe.tf/loadBalancerIPs: "192.168.0.60"
        spec:
          type: LoadBalancer
          selector:
            application: skyline
            component: server
          ports:
            - name: https
              port: 443
              targetPort: 9999
              protocol: TCP
        SVCEOF
      changed_when: true
