    # ==========================================================
    # Phase 9: 검증
    # ==========================================================
    - name: "[Phase 9] Octavia API 헬스체크"
      shell: |
        kubectl exec -n openstack deploy/heat-api -c heat-api -- bash -c '
          export {{ ks_auth_env }}
          openstack loadbalancer list -f json 2>&1
        '
      register: octavia_check
      changed_when: false
      failed_when: false

    - name: "[Phase 9] Octavia API 결과"
      debug:
        var: octavia_check.stdout_lines

    - name: "[Phase 9] Designate API 헬스체크"
      shell: |
        kubectl exec -n openstack deploy/heat-api -c heat-api -- bash -c '
          export {{ ks_auth_env }}
          openstack zone list -f json 2>&1
        '
      register: designate_check
      changed_when: false
      failed_when: false

    - name: "[Phase 9] Designate API 결과"
      debug:
        var: designate_check.stdout_lines

    - name: "[Phase 9] 전체 Helm 릴리스 상태"
      shell: helm list -n openstack -o json | jq -r '.[] | "\(.name)\t\(.revision)\t\(.status)"'
      register: helm_releases
      changed_when: false

    - name: "[Phase 9] Helm 릴리스"
      debug:
        var: helm_releases.stdout_lines

    - name: "[Phase 9] 전체 파드 상태 요약"
      shell: |
        echo "=== Octavia ==="
        kubectl get pods -n openstack -l application=octavia --no-headers
        echo "=== Designate ==="
        kubectl get pods -n openstack -l application=designate --no-headers
        echo "=== Redis ==="
        kubectl get pods -n openstack -l application=redis --no-headers
        echo "=== PowerDNS ==="
        kubectl get pods -n openstack -l application=powerdns --no-headers
      register: pod_summary
      changed_when: false

    - name: "[Phase 9] 파드 요약 출력"
      debug:
        var: pod_summary.stdout_lines
