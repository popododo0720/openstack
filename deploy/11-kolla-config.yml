# ===========================================
# Trove 로컬 Docker 레지스트리 설정 (폐쇄망 대비)
# - DB 컨테이너 이미지를 로컬에서 제공
# - kolla-ansible deploy 전에 실행해야 함
# ===========================================
- name: "Trove 로컬 Docker 레지스트리 설정"
  hosts: stack1
  become: yes

  vars:
    trove_registry_port: 4000
    trove_registry_address: "{{ internal_ip }}"
    trove_db_images:
      - { name: "mysql", tag: "8.0" }
      - { name: "mysql", tag: "8.4" }
      - { name: "mariadb", tag: "10.6" }
      - { name: "mariadb", tag: "11.4" }
      - { name: "postgres", tag: "14" }
      - { name: "postgres", tag: "16" }

  tasks:
    # ── Docker registry 시작 ──
    - name: "Docker registry 실행 확인"
      shell: docker ps --format '{% raw %}{{.Names}}{% endraw %}' | grep -w trove-registry
      register: registry_running
      changed_when: false
      failed_when: false

    - name: "Docker registry 이미지 pull"
      shell: docker pull registry:2
      when: registry_running.rc != 0

    - name: "registry 데이터 디렉토리 생성"
      file:
        path: /opt/trove-registry
        state: directory
        mode: "0755"

    - name: "Docker registry 시작"
      shell: |
        docker run -d --network host --restart=always \
          --name trove-registry \
          -v /opt/trove-registry:/var/lib/registry \
          -e REGISTRY_HTTP_ADDR=0.0.0.0:{{ trove_registry_port }} \
          registry:2
      when: registry_running.rc != 0

    - name: "registry 포트 대기"
      wait_for:
        port: "{{ trove_registry_port }}"
        delay: 2
        timeout: 30
      when: registry_running.rc != 0

    # ── DB Docker 이미지 미러링 ──
    - name: "로컬 레지스트리 이미지 확인"
      shell: "curl -s http://localhost:{{ trove_registry_port }}/v2/{{ item.name }}/tags/list 2>/dev/null"
      loop: "{{ trove_db_images }}"
      register: mirror_check
      changed_when: false
      failed_when: false

    - name: "DB Docker 이미지 pull → push (미러링)"
      shell: |
        docker pull {{ item.item.name }}:{{ item.item.tag }} && \
        docker tag {{ item.item.name }}:{{ item.item.tag }} localhost:{{ trove_registry_port }}/{{ item.item.name }}:{{ item.item.tag }} && \
        docker push localhost:{{ trove_registry_port }}/{{ item.item.name }}:{{ item.item.tag }}
      loop: "{{ mirror_check.results }}"
      when: "item.item.tag not in (item.stdout | default(''))"

    # ── kolla-ansible config override ──
    - name: "kolla config 디렉토리 확인"
      file:
        path: /etc/kolla/config
        state: directory

    - name: "Trove config override 생성"
      copy:
        dest: /etc/kolla/config/trove.conf
        content: |
          # Trove 설정 (로컬 Docker 레지스트리)
          # management_networks는 14-after-deploy.yml에서 동적 설정
          # kolla-ansible deploy/reconfigure 시 자동 반영
          [DEFAULT]
          docker_insecure_registries = {{ trove_guest_registry }}

          [mysql]
          docker_image = {{ local_registry }}/mysql

          [mariadb]
          docker_image = {{ local_registry }}/mariadb

          [postgresql]
          docker_image = {{ local_registry }}/postgres


    - name: "Magnum config override 생성"
      copy:
        dest: /etc/kolla/config/magnum.conf
        content: |
          [trust]
          cluster_user_trust = True

          [drivers]
          openstack_ca_file = /usr/local/share/ca-certificates/kolla-customca-root.crt

    - name: "레지스트리 카탈로그 확인"
      shell: "curl -s http://localhost:{{ trove_registry_port }}/v2/_catalog"
      register: registry_catalog
      changed_when: false

    - name: "레지스트리 상태"
      debug:
        msg: "{{ registry_catalog.stdout }}"

    - name: "config override 확인"
      shell: cat /etc/kolla/config/trove.conf
      register: trove_conf_check
      changed_when: false

    - name: "Trove config override 내용"
      debug:
        msg: "{{ trove_conf_check.stdout_lines }}"

    - name: "Trove guestagent SSL config"
      copy:
        dest: /etc/kolla/config/trove-guestagent.conf
        content: |
          [DEFAULT]
          docker_insecure_registries = {{ trove_guest_registry }}

          [mysql]
          docker_image = {{ trove_guest_registry }}/mysql

          [oslo_messaging_rabbit]
          ssl = true
          ssl_ca_file = /etc/ssl/certs/ca-certificates.crt

    - name: "Neutron ML2 config directory"
      file:
        path: /etc/kolla/config/neutron
        state: directory

    - name: "Neutron ML2 VLAN range config"
      copy:
        dest: /etc/kolla/config/neutron/ml2_conf.ini
        content: |
          [ml2_type_vlan]
          network_vlan_ranges = physnet2:4000:4000

