---
# Kolla Ansible 설치 (stack1 - controller 노드)
- name: "Kolla Ansible 설치"
  hosts: stack1
  become: yes
  vars:
    venv_path: "/root/kolla-venv"

  tasks:
    - name: "빌드 의존성 패키지 설치"
      apt:
        name:
          - git
          - python3-dev
          - python3-venv
          - libffi-dev
          - gcc
          - libssl-dev
          - libdbus-glib-1-dev
        state: present
        update_cache: yes

    - name: "Python 가상환경 생성"
      command: python3 -m venv {{ venv_path }}
      args:
        creates: "{{ venv_path }}/bin/activate"

    - name: "pip 업그레이드"
      shell: |
        source {{ venv_path }}/bin/activate
        pip install -U pip
      args:
        executable: /bin/bash

    - name: "Kolla Ansible 저장소 클론"
      git:
        repo: https://opendev.org/openstack/kolla-ansible
        dest: /root/kolla-ansible
        version: "{{ kolla_version }}"
        force: yes

    - name: "Kolla Ansible 설치"
      shell: |
        source {{ venv_path }}/bin/activate
        pip install /root/kolla-ansible
      args:
        executable: /bin/bash

    - name: "bcrypt 버전 고정 (passlib 호환성)"
      shell: |
        source {{ venv_path }}/bin/activate
        pip install bcrypt==4.0.1
      args:
        executable: /bin/bash

    - name: "/etc/kolla 디렉토리 생성"
      file:
        path: /etc/kolla
        state: directory
        mode: '0755'

    - name: "Kolla 설정 파일 복사"
      copy:
        src: /root/kolla-ansible/etc/kolla/
        dest: /etc/kolla/
        remote_src: yes

    - name: "inventory 파일 복사"
      copy:
        src: /root/kolla-ansible/ansible/inventory/
        dest: /root/
        remote_src: yes

    - name: "Ansible Galaxy 의존성 설치"
      shell: |
        source {{ venv_path }}/bin/activate
        kolla-ansible install-deps
      args:
        executable: /bin/bash

    - name: "활성화 스크립트 생성"
      copy:
        dest: /root/activate-kolla
        mode: '0755'
        content: |
          #!/bin/bash
          source {{ venv_path }}/bin/activate
          echo "Kolla Ansible 가상환경 활성화됨"

    - name: "설치 확인"
      shell: |
        source {{ venv_path }}/bin/activate
        kolla-ansible --version
      args:
        executable: /bin/bash
      register: kolla_version_check

    - name: "버전 출력"
      debug:
        msg: "{{ kolla_version_check.stdout_lines }}"

    - name: "완료 메시지"
      debug:
        msg:
          - "Kolla Ansible 설치 완료!"
          - "활성화: source /root/activate-kolla"
          - "설정파일: /etc/kolla/"
          - "다음: 11-kolla-config.yml 실행"
