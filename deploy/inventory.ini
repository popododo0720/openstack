[all]
stack1 ansible_host=10.250.254.11 storage_ip=192.168.73.11 internal_ip=10.0.2.111 external_ip=192.168.0.61
stack2 ansible_host=10.250.254.12 storage_ip=192.168.73.12 internal_ip=10.0.2.112 external_ip=192.168.0.62
stack3 ansible_host=10.250.254.13 storage_ip=192.168.73.13 internal_ip=10.0.2.113 external_ip=192.168.0.63

[all:vars]
ansible_user=root
ansible_ssh_common_args='-o StrictHostKeyChecking=no'

# 네트워크 대역
storage_network=192.168.73.0/24
internal_network=10.0.2.0/24
external_network=192.168.0.0/24

# Kolla VIP
kolla_internal_vip_address=10.0.2.110
kolla_external_vip_address=192.168.0.60

# 네트워크 인터페이스 (6 NIC 구조)
# enp1s0: management (ansible, 인터넷)
# enp2s0: internal/API (kolla network_interface, VIP .110)
# enp3s0: storage (Ceph)
# enp4s0: external (OVS br-ex, IP없음)
# enp5s0: provider-mgmt (OVS br-mgmt, IP없음, enp2s0과 같은 L2)
# enp6s0: external access (192.168.0.x 고정IP)
network_interface=enp2s0
kolla_external_vip_interface=enp4s0
kolla_internal_vip_interface=enp2s0
neutron_external_interface=enp4s0,enp5s0
neutron_bridge_name=br-ex,br-mgmt
neutron_physical_networks=physnet1,physnet2

# Kolla 설정
kolla_version=stable/2025.1
admin_password=coremax1@#

# Docker Registry (로컬 이미지 레지스트리)
# 사이트별로 이 값만 변경하면 됨
local_registry=192.168.0.216:5000
trove_guest_registry=10.0.2.1:5000

# Designate (DNS as a Service)
dns_domain=cloud.internal.
designate_ns_record=ns1.cloud.internal
# DNS 외부 노출 인터페이스 (external_ip가 붙은 NIC)
# 설정하면 BIND9가 internal + external 양쪽에서 listen
dns_interface=enp6s0
