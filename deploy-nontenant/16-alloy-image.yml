---

- name: "Alloy 내장 Ubuntu 이미지 생성"
  hosts: localhost
  become: yes

  vars:
    base_image_url: "https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img"
    base_image_path: "/root/openstack/images/ubuntu-24.04-base.img"
    alloy_image_path: "/root/openstack/images/ubuntu-24.04-alloy.img"
    image_dir: "/root/openstack/images"
    vminsert_fqdn: "vminsert.monitoring.local"
    vminsert_ip: "192.168.0.60"
    vminsert_url: "http://{{ vminsert_fqdn }}:8480/insert/0/prometheus/api/v1/write"

  tasks:
    - name: "이미지 디렉토리 생성"
      file:
        path: "{{ image_dir }}"
        state: directory
        mode: "0755"

    - name: "libguestfs-tools 설치"
      apt:
        name: libguestfs-tools
        state: present
        update_cache: yes

    - name: "Ubuntu 베이스 이미지 다운로드"
      get_url:
        url: "{{ base_image_url }}"
        dest: "{{ base_image_path }}"
        mode: "0644"
        force: false

    - name: "베이스 이미지 복사 (원본 보존)"
      copy:
        src: "{{ base_image_path }}"
        dest: "{{ alloy_image_path }}"
        remote_src: true
        mode: "0644"

    - name: "이미지 디스크 5GB로 확장"
      command: "qemu-img resize {{ alloy_image_path }} 5G"

    - name: "Alloy config 생성"
      copy:
        dest: /tmp/alloy-vm-config.alloy
        mode: "0644"
        content: |
          // Grafana Alloy - VM Monitoring
          prometheus.exporter.unix "default" {
            enable_collectors = ["cpu", "diskstats", "filesystem", "loadavg", "meminfo", "netdev", "netstat", "os", "uname", "vmstat", "time"]
          }

          prometheus.exporter.process "default" {
            matcher {
              comm = [".+"]
            }
          }

          prometheus.scrape "node" {
            targets         = prometheus.exporter.unix.default.targets
            forward_to      = [prometheus.relabel.add_labels.receiver]
            scrape_interval = "60s"
          }

          prometheus.scrape "process" {
            targets         = prometheus.exporter.process.default.targets
            forward_to      = [prometheus.relabel.add_labels.receiver]
            scrape_interval = "60s"
          }

          prometheus.relabel "add_labels" {
            forward_to = [prometheus.remote_write.default.receiver]
            rule {
              target_label = "vm_name"
              replacement  = env("HOSTNAME")
            }
            rule {
              target_label = "job"
              replacement  = "alloy-vm"
            }
          }

          prometheus.remote_write "default" {
            endpoint {
              url = "{{ vminsert_url }}"
            }
          }

    - name: "cloud-init 스크립트 생성 (Alloy 설치)"
      copy:
        dest: /tmp/alloy-install.sh
        mode: "0755"
        content: |
          #!/bin/bash
          set -e
          apt-get update -qq
          apt-get install -y -qq gpg wget
          mkdir -p /etc/apt/keyrings/
          wget -q -O - https://apt.grafana.com/gpg.key | gpg --dearmor > /etc/apt/keyrings/grafana.gpg
          echo "deb [signed-by=/etc/apt/keyrings/grafana.gpg] https://apt.grafana.com stable main" > /etc/apt/sources.list.d/grafana.list
          apt-get update -qq
          apt-get install -y -qq alloy
          systemctl enable alloy

    - name: "이미지에 Alloy 베이킹"
      shell: |
        export LIBGUESTFS_BACKEND=direct
        virt-customize -a {{ alloy_image_path }} \
          --run-command 'growpart /dev/sda 1 || true' \
          --run-command 'resize2fs /dev/sda1 || true' \
          --run /tmp/alloy-install.sh \
          --copy-in /tmp/alloy-vm-config.alloy:/etc/alloy/ \
          --run-command 'mv /etc/alloy/alloy-vm-config.alloy /etc/alloy/config.alloy' \
          --run-command 'grep -q "{{ vminsert_fqdn }}" /etc/hosts || echo "{{ vminsert_ip }} {{ vminsert_fqdn }}" >> /etc/hosts' \
          --run-command 'mkdir -p /etc/systemd/system/alloy.service.d' \
          --run-command 'printf "[Service]\\nUser=root\\nGroup=root\\n" > /etc/systemd/system/alloy.service.d/override.conf' \
          --run-command 'systemctl enable alloy' \
          --selinux-relabel
      args:
        executable: /bin/bash
      timeout: 1800

    - name: "이미지 크기 확인"
      command: "ls -lh {{ alloy_image_path }}"
      register: image_size
      changed_when: false

    - name: "결과 출력"
      debug:
        msg:
          - "Alloy 내장 이미지 생성 완료: {{ alloy_image_path }}"
          - "{{ image_size.stdout }}"
          - ""
          - "다음 단계(스택1에서 실행):"
          - "  source /root/kolla-venv/bin/activate && source /etc/kolla/admin-openrc.sh"
          - "  openstack image create 'ubuntu-24.04-alloy' --file {{ alloy_image_path }} --disk-format qcow2 --container-format bare --public"
