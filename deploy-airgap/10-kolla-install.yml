---
# Kolla Ansible 설치 (stack1 - controller 노드)
- name: "Kolla Ansible 설치"
  hosts: stack1
  become: yes
  vars:
    venv_path: "/root/kolla-venv"

  tasks:
    - name: "빌드 의존성 패키지 설치"
      apt:
        name:
          - git
          - python3-dev
          - python3-venv
          - libffi-dev
          - gcc
          - libssl-dev
          - libdbus-glib-1-dev
        state: present
        update_cache: yes

    - name: "wheel 저장 디렉토리 생성"
      file:
        path: /root/python-wheels
        state: directory
        mode: '0755'

    - name: "Nexus python-wheels asset 목록 조회"
      uri:
        url: "https://10.250.254.1/service/rest/v1/assets?repository=python-wheels"
        method: GET
        user: admin
        password: "coremax1@#"
        force_basic_auth: yes
        validate_certs: no
        return_content: yes
      register: wheel_assets

    - name: "기존 wheel 파일 정리"
      shell: find /root/python-wheels -maxdepth 1 -type f -delete
      args:
        executable: /bin/bash

    - name: "wheel 파일 다운로드"
      get_url:
        url: "https://10.250.254.1/repository/python-wheels/{{ item.path | basename }}"
        dest: "/root/python-wheels/{{ item.path | basename }}"
        url_username: admin
        url_password: "coremax1@#"
        validate_certs: no
        mode: '0644'
      loop: "{{ (wheel_assets.json['items'] | default([])) }}"
    
    - name: "Python 가상환경 생성"
      command: python3 -m venv {{ venv_path }}
      args:
        creates: "{{ venv_path }}/bin/activate"

    - name: "pip 업그레이드"
      shell: |
        source {{ venv_path }}/bin/activate
        pip install --no-index --find-links /root/python-wheels pip setuptools
      args:
        executable: /bin/bash

    - name: "kolla-ansible 소스 tarball 다운로드"
      get_url:
        url: "https://10.250.254.1/repository/raw-hosted/kolla-ansible.tar.gz"
        dest: /root/kolla-ansible.tar.gz
        url_username: admin
        url_password: "coremax1@#"
        validate_certs: no
        mode: '0644'

    - name: "기존 kolla-ansible 디렉토리 제거"
      file:
        path: /root/kolla-ansible
        state: absent

    - name: "kolla-ansible 압축 해제"
      unarchive:
        src: /root/kolla-ansible.tar.gz
        dest: /root/
        remote_src: yes

    - name: "Kolla Ansible 설치"
      shell: |
        source {{ venv_path }}/bin/activate
        pip install --no-index --find-links /root/python-wheels kolla-ansible bcrypt==4.0.1 python-openstackclient
      args:
        executable: /bin/bash

    - name: "bcrypt 버전 고정 (passlib 호환성)"
      shell: |
        source {{ venv_path }}/bin/activate
        pip install --no-index --find-links /root/python-wheels bcrypt==4.0.1
      args:
        executable: /bin/bash

    - name: "/etc/kolla 디렉토리 생성"
      file:
        path: /etc/kolla
        state: directory
        mode: '0755'

    - name: "Kolla 설정 파일 복사"
      copy:
        src: /root/kolla-ansible/etc/kolla/
        dest: /etc/kolla/
        remote_src: yes

    - name: "inventory 파일 복사"
      copy:
        src: /root/kolla-ansible/ansible/inventory/
        dest: /root/
        remote_src: yes

    - name: "Galaxy 디렉토리 생성"
      file:
        path: /root/galaxy
        state: directory
        mode: '0755'

    - name: "기존 Galaxy tarball 정리"
      shell: find /root/galaxy -maxdepth 1 -type f -name '*.tar.gz' -delete
      args:
        executable: /bin/bash

    - name: "Galaxy tarball 다운로드"
      get_url:
        url: "https://10.250.254.1/repository/raw-hosted/galaxy/{{ item }}"
        dest: "/root/galaxy/{{ item }}"
        url_username: admin
        url_password: "coremax1@#"
        validate_certs: no
        mode: '0644'
      loop:
        - openstack-kolla-1.0.0.tar.gz
        - ansible-netcommon-8.4.0.tar.gz
        - ansible-posix-2.1.0.tar.gz
        - ansible-utils-6.0.1.tar.gz
        - community-crypto-3.1.1.tar.gz
        - community-docker-4.8.7.tar.gz
        - community-general-11.4.6.tar.gz
        - community-library_inventory_filtering_v1-1.1.5.tar.gz
        - containers-podman-1.19.1.tar.gz

    - name: "Ansible Galaxy 의존성 설치"
      shell: |
        source {{ venv_path }}/bin/activate
        ansible-galaxy collection install -p /root/.ansible/collections /root/galaxy/*.tar.gz --force
      args:
        executable: /bin/bash

    - name: "활성화 스크립트 생성"
      copy:
        dest: /root/activate-kolla
        mode: '0755'
        content: |
          #!/bin/bash
          source {{ venv_path }}/bin/activate
          echo "Kolla Ansible 가상환경 활성화됨"

    - name: "설치 확인"
      shell: |
        source {{ venv_path }}/bin/activate
        kolla-ansible --version
      args:
        executable: /bin/bash
      register: kolla_version_check

    - name: "버전 출력"
      debug:
        msg: "{{ kolla_version_check.stdout_lines }}"

    - name: "완료 메시지"
      debug:
        msg:
          - "Kolla Ansible 설치 완료!"
          - "활성화: source /root/activate-kolla"
          - "설정파일: /etc/kolla/"
          - "다음: 11-kolla-config.yml 실행"

    - name: "Masakari hostmonitor 버그픽스 패치 (LP#2101026 - privileged + pacemaker volume)"
      shell: |
        source {{ venv_path }}/bin/activate
        DEFAULTS="{{ venv_path }}/share/kolla-ansible/ansible/roles/masakari/defaults/main.yml"
        HANDLERS="{{ venv_path }}/share/kolla-ansible/ansible/roles/masakari/handlers/main.yml"
        # defaults: hostmonitor에 privileged: True 추가
        sed -i '/^  masakari-hostmonitor:/,/dimensions:/{/dimensions:/i\    privileged: True
        }' "$DEFAULTS"
        # handlers: hostmonitor restart에 privileged 라인 추가
        sed -i '/Restart masakari-hostmonitor/,/dimensions/{/ipc_mode/a\    privileged: "{{ service.privileged | default(True) }}"
        }' "$HANDLERS"
      args:
        executable: /bin/bash

    - name: "Masakari hostmonitor sudoers 패치 (crmadmin/cibadmin NOPASSWD 추가)"
      shell: |
        source {{ venv_path }}/bin/activate
        SUDOERS_TPL="{{ venv_path }}/share/kolla-ansible/ansible/roles/masakari/templates/masakari_monitors_sudoers.j2"
        if [ -f "$SUDOERS_TPL" ]; then
          if ! grep -q crmadmin "$SUDOERS_TPL"; then
            echo 'masakari ALL=(root) NOPASSWD: /usr/sbin/crmadmin *' >> "$SUDOERS_TPL"
            echo 'masakari ALL=(root) NOPASSWD: /usr/sbin/cibadmin --query' >> "$SUDOERS_TPL"
            echo 'Patched sudoers template'
          else
            echo 'Already patched'
          fi
        else
          echo 'Template not found, will patch containers directly after deploy'
        fi
      args:
        executable: /bin/bash

