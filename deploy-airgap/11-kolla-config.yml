---
# Kolla 설정 (globals.yml, multinode inventory)
- name: "Kolla 설정"
  hosts: stack1
  become: yes

  tasks:
    - name: "원본 globals.yml 백업"
      copy:
        src: /etc/kolla/globals.yml
        dest: /etc/kolla/globals.yml.backup
        remote_src: yes

    - name: "globals.yml 복사"
      copy:
        src: /root/openstack/deploy-airgap/globals.yml
        dest: /etc/kolla/globals.yml

    - name: "네트워크 인터페이스 수정 - network_interface"
      lineinfile:
        path: /etc/kolla/globals.yml
        regexp: '^network_interface:'
        line: 'network_interface: "{{ network_interface }}"'

    - name: "네트워크 인터페이스 수정 - kolla_external_vip_interface"
      lineinfile:
        path: /etc/kolla/globals.yml
        regexp: '^kolla_external_vip_interface:'
        line: 'kolla_external_vip_interface: "{{ kolla_external_vip_interface }}"'

    - name: "네트워크 인터페이스 수정 - kolla_internal_vip_interface"
      lineinfile:
        path: /etc/kolla/globals.yml
        regexp: '^kolla_internal_vip_interface:'
        line: 'kolla_internal_vip_interface: "{{ kolla_internal_vip_interface }}"'

    - name: "네트워크 인터페이스 수정 - neutron_external_interface"
      lineinfile:
        path: /etc/kolla/globals.yml
        regexp: '^neutron_external_interface:'
        line: 'neutron_external_interface: "{{ neutron_external_interface }}"'

    - name: "Neutron 브릿지 설정 - neutron_bridge_name"
      lineinfile:
        path: /etc/kolla/globals.yml
        regexp: '^neutron_bridge_name:'
        line: 'neutron_bridge_name: "{{ neutron_bridge_name }}"'

    - name: "Neutron 물리 네트워크 - neutron_physical_networks"
      lineinfile:
        path: /etc/kolla/globals.yml
        regexp: '^neutron_physical_networks:'
        line: 'neutron_physical_networks: "{{ neutron_physical_networks }}"'

    - name: "VIP 수정 - kolla_internal_vip_address"
      lineinfile:
        path: /etc/kolla/globals.yml
        regexp: '^kolla_internal_vip_address:'
        line: 'kolla_internal_vip_address: "{{ kolla_internal_vip_address }}"'

    - name: "VIP 수정 - kolla_external_vip_address"
      lineinfile:
        path: /etc/kolla/globals.yml
        regexp: '^kolla_external_vip_address:'
        line: 'kolla_external_vip_address: "{{ kolla_external_vip_address }}"'

    - name: "Cinder HA 클러스터 이름 설정"
      lineinfile:
        path: /etc/kolla/globals.yml
        regexp: '^cinder_cluster_name:'
        line: 'cinder_cluster_name: "ceph"'
        insertafter: '^enable_cinder:'

    - name: "Cinder NFS backend 비활성화 (Ceph 사용)"
      lineinfile:
        path: /etc/kolla/globals.yml
        regexp: '^enable_cinder_backend_nfs:'
        line: 'enable_cinder_backend_nfs: "no"'


    - name: "Docker Registry 설정 - docker_registry"
      lineinfile:
        path: /etc/kolla/globals.yml
        regexp: '^docker_registry:'
        line: 'docker_registry: "{{ local_registry }}"'

    - name: "Docker Registry insecure 설정"
      lineinfile:
        path: /etc/kolla/globals.yml
        regexp: '^docker_registry_insecure:'
        line: 'docker_registry_insecure: "yes"'

    - name: "Docker namespace 설정"
      lineinfile:
        path: /etc/kolla/globals.yml
        regexp: '^docker_namespace:'
        line: 'docker_namespace: "openstack.kolla"'

    - name: "multinode inventory 설정"
      copy:
        dest: /root/multinode
        content: |
          # FX-HCI 환경 multinode inventory
          # Based on kolla-ansible original template

          [control]
          stack1 ansible_host={{ hostvars['stack1']['internal_ip'] }}
          stack2 ansible_host={{ hostvars['stack2']['internal_ip'] }}
          stack3 ansible_host={{ hostvars['stack3']['internal_ip'] }}

          [network]
          stack1 ansible_host={{ hostvars['stack1']['internal_ip'] }}
          stack2 ansible_host={{ hostvars['stack2']['internal_ip'] }}
          stack3 ansible_host={{ hostvars['stack3']['internal_ip'] }}

          [compute]
          stack1 ansible_host={{ hostvars['stack1']['internal_ip'] }}
          stack2 ansible_host={{ hostvars['stack2']['internal_ip'] }}
          stack3 ansible_host={{ hostvars['stack3']['internal_ip'] }}

          [monitoring]
          stack1 ansible_host={{ hostvars['stack1']['internal_ip'] }}
          stack2 ansible_host={{ hostvars['stack2']['internal_ip'] }}
          stack3 ansible_host={{ hostvars['stack3']['internal_ip'] }}

