[all]
stack1 ansible_host=10.250.254.11 storage_ip=192.168.73.11 internal_ip=10.0.2.11 tunnel_ip=10.0.3.11 external_ip=192.168.0.31
stack2 ansible_host=10.250.254.12 storage_ip=192.168.73.12 internal_ip=10.0.2.12 tunnel_ip=10.0.3.12 external_ip=192.168.0.32
stack3 ansible_host=10.250.254.13 storage_ip=192.168.73.13 internal_ip=10.0.2.13 tunnel_ip=10.0.3.13 external_ip=192.168.0.33

[all:vars]
ansible_user=root
ansible_ssh_common_args='-o StrictHostKeyChecking=no'

# 네트워크 대역
storage_network=192.168.73.0/24
internal_network=10.0.2.0/24
tunnel_network=10.0.3.0/24
external_network=192.168.0.0/24
management_network=10.250.254.0/24

# Kolla VIP
kolla_internal_vip_address=10.0.2.10
kolla_external_vip_address=192.168.0.60
kolla_internal_fqdn=internal.openstack.local
kolla_external_fqdn=public.openstack.local
vminsert_fqdn=vminsert.monitoring.local

# 네트워크 인터페이스 (6 NIC 구조)
# enp216s0f0: external access (192.168.0.x 고정IP, 인터넷)
# enp216s0f1: br-ex (Neutron, IP없음, VIP 192.168.0.60 뜸)
# enp216s0f2: tunnel (Geneve, 10.0.3.x)
# deploy-nontenant: tenant/self-service network를 만들지 않는 provider-only 실험용. NIC는 남겨두되 워크로드는 사용하지 않음.
# enp216s0f3: internal/API (kolla network_interface, VIP 10.0.2.10)
# eno1np0:    storage (Ceph, 192.168.73.x)
# eno2np1:    management (Ansible SSH, 10.250.254.x)
network_interface=enp216s0f3
kolla_external_vip_interface=enp216s0f1
kolla_internal_vip_interface=enp216s0f3
neutron_external_interface=enp216s0f1
neutron_bridge_name=br-ex
neutron_physical_networks=external
tunnel_interface=enp216s0f2
storage_interface=eno1np0

# Ceph OSD 디스크 (쉼표 구분, 추가 시 여기에)
# 예: osd_devices=/dev/sdb,/dev/sdc,/dev/sdd
osd_devices=/dev/sdb

# Kolla 설정
kolla_version=stable/2025.1
admin_password=coremax1@#

# Docker Registry (로컬 이미지 레지스트리)
local_registry=192.168.0.216:5000

# Airgap artifact endpoints (temporary on 192.168.0.216; can later move to 10.250.254.1)
airgap_enabled=true
artifact_host=192.168.0.216
airgap_file_base_url=http://192.168.0.216/artifacts
airgap_docker_apt_repo=http://192.168.0.216/artifacts/apt/docker
airgap_grafana_apt_repo=http://192.168.0.216/artifacts/apt/grafana
airgap_pypi_simple_url=http://192.168.0.216/artifacts/pypi/simple
airgap_ansible_galaxy_server=http://192.168.0.216/artifacts/ansible
airgap_image_base_url=http://192.168.0.216/artifacts/images
airgap_kolla_source_dir=/root/openstack/airgap-src/kolla-ansible
airgap_wheelhouse_url=http://192.168.0.216/artifacts/wheels
